name: news-pipeline

# Trigger automático del brief de mercado. Reemplaza al Vercel Cron (que moría a los
# 60s en el plan Hobby). GitHub Actions no tiene ese límite, así que el pipeline
# (Tavily + Firecrawl + cadena LLM) completa sin cortarse.
on:
  schedule:
    - cron: '0 13 * * 1,5' # Lun/Vie 13:00 UTC (07:00 MX) — mismo horario que antes
  workflow_dispatch: {} # disparo manual desde la pestaña Actions

# Evita que dos ejecuciones del pipeline corran a la vez.
concurrency:
  group: news-pipeline
  cancel-in-progress: false

jobs:
  run:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - run: npm ci

      - name: Run news pipeline
        run: npx tsx scripts/run-news-pipeline.ts
        env:
          NEXT_PUBLIC_SUPABASE_URL: ${{ secrets.NEXT_PUBLIC_SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
          TAVILY_API_KEY: ${{ secrets.TAVILY_API_KEY }}
          FIRECRAWL_API_KEY: ${{ secrets.FIRECRAWL_API_KEY }}
          FIRECRAWL_API_KEY_2: ${{ secrets.FIRECRAWL_API_KEY_2 }}
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          GEMINI_ANALYSIS_MODEL: ${{ secrets.GEMINI_ANALYSIS_MODEL }}
          GEMINI_SELECTION_MODEL: ${{ secrets.GEMINI_SELECTION_MODEL }}
          OLLAMA_API_URL: ${{ secrets.OLLAMA_API_URL }}
          OLLAMA_API_KEY: ${{ secrets.OLLAMA_API_KEY }}
          OLLAMA_MODEL: ${{ secrets.OLLAMA_MODEL }}
          NEWS_ANALYSIS_MODEL: ${{ secrets.NEWS_ANALYSIS_MODEL }}
          CEREBRAS_API_KEY: ${{ secrets.CEREBRAS_API_KEY }}
          NEWS_LLM_CHAIN: ${{ secrets.NEWS_LLM_CHAIN }}
